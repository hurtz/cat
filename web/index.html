  CHAR_H = 18;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function weightedPick(arr, weights) {
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < arr.length; i++) { r -= weights[i]; if (r <= 0) return arr[i]; }
  return arr[arr.length - 1];
}
function hslColor(h, s = 80, l = 65) { return `hsl(${h},${s}%,${l}%)`; }

// ─── Stars ──────────────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 30; i++) stars.push({ x: Math.random(), y: Math.random(), ch: pick(['.','·','*','✦','⋆']) });

function drawStars() {
  for (const s of stars) {
    if (Math.random() < 0.02) { s.x = Math.random(); s.y = Math.random(); }
    ctx.fillStyle = `hsl(0,0%,${20 + (Math.random() < 0.08 ? 40 : 0)}%)`;
    ctx.fillText(s.ch, s.x * W, s.y * H);
  }
}

// ─── Pet class ──────────────────────────────────────────────────
class GamePet {
  constructor(name, charType = 'cat', personality = 'default') {
    this.name = name;
    this.charType = charType;
    this.personality = PERSONALITIES[personality] || PERSONALITIES.default;
    this.sprites = CHARACTERS[charType] || CHARACTERS.cat;
    this.x = 0.3 + Math.random() * 0.4;
    this.y = 0.3 + Math.random() * 0.3;
    const e = this.personality.energy;
    this.vx = pick([-0.005, -0.003, 0.003, 0.005]) * e;
    this.vy = pick([-0.003, 0.003]) * e;
    this.mood = 'idle'; this.moodTimer = 0;
    this.frame = 0; this.tick = 0;
    this.hue = Math.random() * 360; this.hueTimer = 0;
    this.thought = null; this.thoughtTimer = 0;
    this.trail = []; this.trailOn = false;
    this.particles = [];
    this.rainbow = false;
    this.gravity = false;
    this.allThoughts = [...THOUGHTS, ...this.personality.thoughts];
  }

  pickMood() {
    const old = this.mood;
    this.mood = weightedPick(MOODS, MOOD_WEIGHTS);
    this.moodTimer = 30 + Math.random() * 90;
    if (old === 'dance') this.rainbow = false;
    const e = this.personality.energy;
    if (this.mood === 'excited') { this.vx = pick([-0.01,-0.007,0.007,0.01]) * e; this.vy = pick([-0.006,0.006]) * e; }
    else if (this.mood === 'sleepy') { this.vx = 0; this.vy = 0; }
    else if (this.mood === 'dance') this.rainbow = true;
    else if (this.mood === 'pounce') { this.vx = pick([-0.014,0.014]) * e; this.vy = pick([-0.007,0.007]) * e; }
    if (Math.random() < 0.3) this.burst();
  }

  burst() {
    for (let i = 0; i < 3 + Math.random() * 5; i++) {
      this.particles.push({
        x: this.x + (Math.random() - 0.3) * 0.05,
        y: this.y + (Math.random() - 0.3) * 0.03,
        vx: (Math.random() - 0.5) * 0.006,
        vy: (Math.random() - 0.7) * 0.005,
        life: 10 + Math.random() * 20,
        ch: pick(SPARKLE_CHARS),
        hue: Math.random() * 360,
      });
    }
  }

  update() {
    this.tick++;
    this.moodTimer--;
    if (this.moodTimer <= 0) this.pickMood();

    this.thoughtTimer--;
    if (this.thoughtTimer <= 0) {
      this.thought = Math.random() < 0.3 ? pick(this.allThoughts) : null;
      this.thoughtTimer = this.thought ? 35 + Math.random() * 50 : 15 + Math.random() * 25;
    }

    this.hueTimer--;
    if (this.hueTimer <= 0) {
      if (this.rainbow) { this.hue = (this.hue + 6) % 360; this.hueTimer = 1; }
      else { this.hue = Math.random() * 360; this.hueTimer = 20 + Math.random() * 40; }
    }

    const chaos = this.personality.chaos;
    if (Math.random() < 0.008 * chaos) this.trailOn = !this.trailOn;
    if (Math.random() < 0.05 * chaos && this.mood !== 'sleepy') {
      const e = this.personality.energy;
      this.vx += (Math.random() - 0.5) * 0.003 * e;
      this.vy += (Math.random() - 0.5) * 0.002 * e;
      this.vx = Math.max(-0.014 * e, Math.min(0.014 * e, this.vx));
      this.vy = Math.max(-0.008 * e, Math.min(0.008 * e, this.vy));
    }
    if (Math.random() < 0.003 * chaos) this.gravity = !this.gravity;
    if (this.gravity && this.mood !== 'sleepy') this.vy = Math.min(0.008, this.vy + 0.0012);

    if (this.trailOn) {
      this.trail.push({ x: this.x, y: this.y, ch: pick(TRAIL_CHARS), hue: this.hue, life: 30 });
      if (this.trail.length > 30) this.trail.shift();
    }
    this.trail = this.trail.filter(t => { t.life--; return t.life > 0; });

    this.x += this.vx; this.y += this.vy;
    if (this.x < 0.02) { this.x = 0.02; this.vx = Math.abs(this.vx) || 0.003; this.burst(); }
    if (this.x > 0.88) { this.x = 0.88; this.vx = -(Math.abs(this.vx) || 0.003); this.burst(); }
    if (this.y < 0.05) { this.y = 0.05; this.vy = Math.abs(this.vy) || 0.002; }
    if (this.y > 0.88) { this.y = 0.88; this.vy = this.gravity ? -(0.005 + Math.random() * 0.003) : -(Math.abs(this.vy) || 0.002); }

    this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
    this.particles = this.particles.filter(p => p.life > 0);

    const frames = this.sprites[this.mood] || this.sprites.idle;
    this.frame = (this.frame + 1) % frames.length;
  }

  draw(isMe) {
    const frames = this.sprites[this.mood] || this.sprites.idle;
    const frame = frames[this.frame % frames.length];
    const px = this.x * W;
    const py = this.y * H;

    // trail
    for (const t of this.trail) {
      ctx.fillStyle = hslColor(t.hue, 60, 50 + (1 - t.life/30) * 30);
      ctx.globalAlpha = t.life / 30;
      ctx.fillText(t.ch, t.x * W, t.y * H);
    }
    ctx.globalAlpha = 1;

    // particles
    for (const p of this.particles) {
      ctx.fillStyle = hslColor(p.hue, 80, 70);
      ctx.globalAlpha = p.life / 30;
      ctx.fillText(p.ch, p.x * W, p.y * H);
    }
    ctx.globalAlpha = 1;

    // sprite
    for (let i = 0; i < frame.length; i++) {
      const line = frame[i];
      for (let j = 0; j < line.length; j++) {
        if (line[j] === ' ') continue;
        if (this.rainbow) {
          ctx.fillStyle = hslColor((this.tick * 6 + j * 20 + i * 40) % 360, 90, 65);
        } else {
          ctx.fillStyle = hslColor(this.hue, isMe ? 80 : 70, isMe ? 65 : 55);
        }
        ctx.fillText(line[j], px + j * CHAR_W, py + i * CHAR_H);
      }
    }

    // name tag
    ctx.fillStyle = isMe ? '#fff' : hslColor(this.hue, 70, 55);
    ctx.fillText(isMe ? `${this.name} (you)` : this.name, px, py - 8);

    // thought bubble
    if (this.thought) {
      const tx = px + 11 * CHAR_W;
      let ty = py - CHAR_H * 1.5;
      if (ty < 20) ty = py + CHAR_H * 5;
      if (tx + this.thought.length * CHAR_W > W - 40) return; // skip if off-screen
      ctx.fillStyle = 'rgba(200,200,255,0.8)';
      ctx.fillText(`╭${'─'.repeat(this.thought.length + 2)}╮`, tx, ty);
      ctx.fillText(`│ ${this.thought} │`, tx, ty + CHAR_H);
      ctx.fillText(`╰${'─'.repeat(this.thought.length + 2)}╯`, tx, ty + CHAR_H * 2);
    }
  }
}

// ─── Network ────────────────────────────────────────────────────
let ws = null, myId = null, myName = '', myChar = 'cat', myPers = 'default', room = 'default';
let peers = {}, roster = {}, emotes = [];
let connected = false;

function getRoom() {
  return new URLSearchParams(location.search).get('room') || 'default';
}

function connect() {
  room = getRoom();
  myId = Math.random().toString(36).slice(2, 10);
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    connected = true;
    ws.send(JSON.stringify({ type: 'join', id: myId, name: myName, room }));
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'states') peers = msg.peers || {};
    else if (msg.type === 'roster') roster = msg.players || {};
    else if (msg.type === 'emote') emotes.push({ from: msg.from, emote: msg.emote, t: Date.now() + 3000 });
  };
  ws.onclose = () => { connected = false; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
}

function sendState(pet) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'state', data: {
    name: pet.name, x: pet.x, y: pet.y,
    mood: pet.mood, color: pet.hue, frame: pet.frame,
    character: pet.charType,
  }}));
}

function sendEmote(emote) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'emote', emote }));
}

// ─── Friend rendering ───────────────────────────────────────────
const friendPets = {};
function getFriendPet(pid, state) {
  const charType = state.character || 'cat';
  if (!friendPets[pid] || friendPets[pid].charType !== charType) {
    friendPets[pid] = new GamePet(state.name || '???', charType);
    friendPets[pid].hue = FRIEND_HUES[Object.keys(friendPets).length % FRIEND_HUES.length];
  }
  const fp = friendPets[pid];
  fp.x += (state.x - fp.x) * 0.12;
  fp.y += (state.y - fp.y) * 0.12;
  fp.mood = state.mood || 'idle';
  fp.name = state.name || roster[pid] || '???';
  fp.frame = state.frame || 0;
  return fp;
}

// ─── Main loop ──────────────────────────────────────────────────
let pet = null;
let netTick = 0;
let lastFrame = 0;
const TARGET_MS = 50; // ~20fps (slower, more chill)

function loop(ts) {
  if (ts - lastFrame < TARGET_MS) { requestAnimationFrame(loop); return; }
  lastFrame = ts;

  resize();
  ctx.clearRect(0, 0, W, H);
  ctx.font = '16px Courier New';
  drawStars();

  if (!pet) { requestAnimationFrame(loop); return; }

  pet.update();

  for (const [pid, state] of Object.entries(peers)) {
    getFriendPet(pid, state).draw(false);
  }
  for (const pid of Object.keys(friendPets)) {
    if (!peers[pid]) delete friendPets[pid];
  }

  pet.draw(true);

  // emotes
  const now = Date.now();
  emotes = emotes.filter(e => e.t > now);
  for (let i = 0; i < Math.min(emotes.length, 5); i++) {
    const e = emotes[emotes.length - 1 - i];
    ctx.fillStyle = 'rgba(255,255,200,0.9)';
    ctx.fillText(`${e.from}: ${e.emote}`, W / 2 - 60, 40 + i * 22);
  }

  netTick++;
  if (netTick % 4 === 0) sendState(pet);

  const names = Object.values(roster);
  document.getElementById('hud').textContent =
    `${pet.charType} · ${pet.mood}${pet.rainbow ? '  🌈' : ''}${pet.gravity ? '  🌍' : ''}${pet.trailOn ? '  ✨' : ''}  ${connected ? '🟢' : '🔴'} ${names.length} online`;
  document.getElementById('player-list').innerHTML =
    names.map(n => `<div class="player">${n === myName ? `<b>${n} (you)</b>` : n}</div>`).join('');

  requestAnimationFrame(loop);
}

// ─── Join screen: character picker ──────────────────────────────
const charPicker = document.getElementById('char-picker');
const persPicker = document.getElementById('personality-picker');
const heroPreview = document.getElementById('hero-preview');
let selectedChar = 'cat';
let selectedPers = 'default';

for (const [key, char] of Object.entries(CHARACTERS)) {
  const el = document.createElement('div');
  el.className = 'char-option' + (key === 'cat' ? ' selected' : '');
  el.innerHTML = `<div>${char.preview}</div><div class="char-label">${key}</div>`;
  el.addEventListener('click', () => {
    selectedChar = key;
    charPicker.querySelectorAll('.char-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    heroPreview.textContent = char.preview;
  });
  charPicker.appendChild(el);
}

for (const [key, pers] of Object.entries(PERSONALITIES)) {
  const el = document.createElement('div');
  el.className = 'pers-option' + (key === 'default' ? ' selected' : '');
  el.textContent = `${key} (${pers.label})`;
  el.addEventListener('click', () => {
    selectedPers = key;
    persPicker.querySelectorAll('.pers-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
  });
  persPicker.appendChild(el);
}

document.getElementById('room-info').textContent = `room: ${getRoom()}`;

// ─── Start ──────────────────────────────────────────────────────
document.getElementById('join-btn').addEventListener('click', startGame);
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });

function startGame() {
  myName = document.getElementById('name-input').value.trim() || selectedChar;
  myChar = selectedChar;
  myPers = selectedPers;
  document.getElementById('join-screen').classList.add('hidden');
  document.getElementById('emote-bar').style.display = 'flex';
  document.body.style.cursor = 'default';
  pet = new GamePet(myName, myChar, myPers);
  connect();
}

document.querySelectorAll('#emote-bar button').forEach(btn => {
  btn.addEventListener('click', () => sendEmote(btn.dataset.emote));
});

requestAnimationFrame(loop);
</script>
